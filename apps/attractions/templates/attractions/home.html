{% extends 'attractions/base.html' %}

{% block title %}{{ ui.site_title }}{% endblock %}

{% block content %}
  <section class="hero-map-page">
    <div class="container hero-map-shell">
      <div class="hero-map-copy">
        <span class="section-pill">{{ ui.map_live_badge }}</span>
        <h1 class="hero-map-title">{{ ui.home_title }}</h1>
        <p class="hero-map-subtitle">{{ ui.home_subtitle }}</p>
      </div>

      <div class="hero-map-card">
        <div class="hero-map-stage">
          <svg viewBox="140 60 1160 640" class="hero-map-svg" aria-label="{{ ui.site_title }}">
            <defs>
              <filter id="hero-glow" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
                <feMerge>
                  <feMergeNode in="blur"></feMergeNode>
                  <feMergeNode in="SourceGraphic"></feMergeNode>
                </feMerge>
              </filter>
            </defs>

            {% for region in regions %}
              <g
                class="region-group"
                data-region-id="{{ region.id }}"
                data-cx="{{ region.cx }}"
                data-cy="{{ region.cy }}"
                data-color="{{ region.color }}"
              >
                <path
                  class="region-path"
                  d="{{ region.path }}"
                  fill="rgba({{ region.r }}, {{ region.g }}, {{ region.b }}, 0.24)"
                  stroke="rgba({{ region.r }}, {{ region.g }}, {{ region.b }}, 0.58)"
                  stroke-width="2"
                ></path>
                <circle cx="{{ region.cx }}" cy="{{ region.cy }}" r="5" fill="{{ region.color }}"></circle>
                <text x="{{ region.cx }}" y="{{ region.cy|add:'-14' }}" text-anchor="middle" class="hero-region-label">
                  {{ region.name }}
                </text>
              </g>
            {% endfor %}

            {% for city in cities %}
              <g class="hero-city-dot">
                <circle cx="{{ city.cx }}" cy="{{ city.cy }}" r="7" fill="rgba(255,255,255,0.14)"></circle>
                <circle cx="{{ city.cx }}" cy="{{ city.cy }}" r="3.8" fill="#ffffff"></circle>
              </g>
            {% endfor %}
          </svg>

          <div id="region-tooltip" class="region-tooltip-card" aria-hidden="true">
            <strong class="region-name"></strong>
            <span class="region-tagline"></span>
            <small>{{ ui.click_to_explore }}</small>
          </div>
        </div>

        <div class="hero-map-stats">
          <div class="hero-stat">
            <span>{{ ui.regions }}</span>
            <strong>9</strong>
          </div>
          <div class="hero-stat">
            <span>{{ ui.population }}</span>
            <strong>7.2M</strong>
          </div>
          <div class="hero-stat">
            <span>{{ ui.area }}</span>
            <strong>199,951 km2</strong>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const regions = {{ regions_json|safe }};
      const regionGroups = document.querySelectorAll(".region-group");
      const tooltip = document.getElementById("region-tooltip");
      const projectX = (value) => `${((Number(value) - 140) / 1160) * 100}%`;
      const projectY = (value) => `${((Number(value) - 60) / 640) * 100}%`;

      regionGroups.forEach((group) => {
        const path = group.querySelector(".region-path");
        const region = regions.find((item) => item.id === group.dataset.regionId);

        if (!region || !path) {
          return;
        }

        group.addEventListener("mouseenter", () => {
          path.setAttribute("fill", `rgba(${region.r}, ${region.g}, ${region.b}, 0.44)`);
          path.setAttribute("stroke", region.color);
          path.setAttribute("filter", "url(#hero-glow)");
          tooltip.querySelector(".region-name").textContent = region.name;
          tooltip.querySelector(".region-tagline").textContent = region.tagline;
          tooltip.style.left = projectX(group.dataset.cx);
          tooltip.style.top = projectY(group.dataset.cy);
          tooltip.classList.add("visible");
          tooltip.setAttribute("aria-hidden", "false");
        });

        group.addEventListener("mouseleave", () => {
          path.setAttribute("fill", `rgba(${region.r}, ${region.g}, ${region.b}, 0.24)`);
          path.setAttribute("stroke", `rgba(${region.r}, ${region.g}, ${region.b}, 0.58)`);
          path.removeAttribute("filter");
          tooltip.classList.remove("visible");
          tooltip.setAttribute("aria-hidden", "true");
        });

        group.addEventListener("click", () => {
          window.location.href = `{% url 'attractions:region_detail' 'REGION_ID' %}`.replace("REGION_ID", region.id) + "?lang={{ lang }}";
        });
      });
    });
  </script>
{% endblock %}
